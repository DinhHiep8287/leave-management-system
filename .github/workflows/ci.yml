name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: leave_admin
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: leave_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leave_admin -d leave_management_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run tests
        env:
          # build.gradle.kts test task reads these to target the dedicated test DB.
          SPRING_DATASOURCE_URL_TEST: jdbc:postgresql://localhost:5432/leave_management_test
          POSTGRES_USER: leave_admin
          POSTGRES_PASSWORD: ci_test_password
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon

  frontend:
    name: Frontend (typecheck / lint / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.1
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
