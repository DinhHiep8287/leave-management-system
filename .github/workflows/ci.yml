name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: leave_admin
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: leave_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leave_admin -d leave_management_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run tests
        env:
          # build.gradle.kts test task reads these to target the dedicated test DB.
          SPRING_DATASOURCE_URL_TEST: jdbc:postgresql://localhost:5432/leave_management_test
          POSTGRES_USER: leave_admin
          POSTGRES_PASSWORD: ci_test_password
          # App + tests target Asia/Ho_Chi_Minh (REQUIREMENTS §12); the runner defaults
          # to UTC. Align so date-sensitive behaviour matches the documented environment.
          TZ: Asia/Ho_Chi_Minh
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon --stacktrace
      - name: Print test failures
        if: failure()
        run: |
          echo "=== Test classes with failures ==="
          for f in $(grep -rl '<failure\|<error' build/test-results/test/ 2>/dev/null); do
            echo "----- $f -----"
            grep -E 'testcase name=|<failure|<error|message=' "$f" | head -40
            echo
          done

  frontend:
    name: Frontend (typecheck / lint / test / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.1
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Start the dev stack
        run: |
          cp .env.example .env
          docker compose up -d --build
      - name: Wait for backend + frontend
        run: |
          echo "Waiting for backend /api/health (gradle bootRun compiles inside the container)..."
          for i in $(seq 1 120); do
            if curl -fsS http://localhost:8080/api/health >/dev/null 2>&1; then
              echo "backend up after ~$((i*5))s"; break
            fi
            if [ "$i" = "120" ]; then echo "backend never became healthy"; exit 1; fi
            sleep 5
          done
          for i in $(seq 1 36); do
            if curl -fsS http://localhost:5173 >/dev/null 2>&1; then
              echo "frontend up"; break
            fi
            if [ "$i" = "36" ]; then echo "frontend never became ready"; exit 1; fi
            sleep 5
          done
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium
      - name: Run smoke
        run: python e2e/run_smoke.py
      - name: Dump container logs
        if: failure()
        run: docker compose logs backend frontend --tail 200
      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: docs/screenshots/
          if-no-files-found: ignore
