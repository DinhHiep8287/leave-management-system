# Production overrides (active when SPRING_PROFILES_ACTIVE=prod).
# Only differences from application.yml are listed here.
spring:
  datasource:
    hikari:
      # Sized for serverless Postgres (Neon suspends idle computes after ~5 minutes):
      # keep the pool small and retire connections before the server can cut them.
      # Do NOT add keepalive-time — pinging would keep Neon awake and burn compute hours.
      maximum-pool-size: 10
      minimum-idle: 1
      max-lifetime: 270000
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  shutdown: graceful
  error:
    # Do not leak exception messages on unhandled paths; the API error envelope
    # (GlobalExceptionHandler) still returns intended messages for handled errors.
    include-message: never

# Disable the API docs / Swagger UI in production.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Expose only health + info for readiness/liveness probes.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: INFO
    com.peih68.leave: INFO
