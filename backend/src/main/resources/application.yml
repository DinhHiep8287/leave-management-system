spring:
  application:
    name: leave-management
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
  docker:
    compose:
      enabled: false
  servlet:
    multipart:
      max-file-size: ${APP_ATTACHMENTS_MAX_FILE_SIZE:5MB}
      max-request-size: ${APP_ATTACHMENTS_MAX_REQUEST_SIZE:25MB}

server:
  # PaaS platforms (Railway, Fly.io...) inject PORT; default stays 8080 for compose.
  port: ${PORT:8080}
  servlet:
    context-path: /api
  forward-headers-strategy: framework
  error:
    include-message: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  attachments:
    enabled: ${APP_ATTACHMENTS_ENABLED:false}
    storage-dir: ${APP_ATTACHMENTS_STORAGE_DIR:/app/uploads/attachments}
    max-files-per-request: ${APP_ATTACHMENTS_MAX_FILES_PER_REQUEST:5}
    max-file-size-bytes: ${APP_ATTACHMENTS_MAX_FILE_SIZE_BYTES:5242880}
    allowed-content-types:
      - application/pdf
      - image/jpeg
      - image/png

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.peih68.leave: DEBUG
