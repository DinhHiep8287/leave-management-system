services:
  postgres:
    image: postgres:16-alpine
    container_name: leave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leave_management}
      POSTGRES_USER: ${POSTGRES_USER:-leave_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_local}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leave_admin} -d ${POSTGRES_DB:-leave_management}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - leave-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: leave-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-leave_management}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-leave_admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_local}
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_long_random_secret_at_least_32_chars}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
      - "${BACKEND_DEBUG_PORT:-5005}:5005"
    volumes:
      - ./backend:/app
      - gradle-cache:/home/gradle/.gradle
    networks:
      - leave-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: leave-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    networks:
      - leave-net

networks:
  leave-net:
    driver: bridge

volumes:
  postgres-data:
  gradle-cache:
  frontend-node-modules:
